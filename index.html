<html lang="en">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
    </svg>
    FlightPulse
  </div>
  <div class="api-status">
    <div class="api-badge" id="badge-flights"><div class="dot"></div>Live Flights</div>
    <div class="api-badge" id="badge-weather"><div class="dot"></div>Weather</div>
  </div>
  <div class="flightaware-credit">Data provided by FlightAware</div>
</header>

<!-- MAIN -->
<main>
  <div class="hero">
    <h1>Live Flight Tracker</h1>
    <p>Search a flight number below, or browse live flights currently in the air.</p>
  </div>

  <div class="search-box">
    <label>Flight Number</label>
    <div class="search-row">
      <input type="text" id="flight-input" placeholder="e.g. DAL820, QF28, LY495, N992DB" autocomplete="off" />
      <button class="btn" onclick="searchFlight()">Search</button>
    </div>
  </div>

  <!-- Search results appear here -->
  <div id="results"></div>

  <!-- Live flights feed -->
  <div id="live-section">
    <div class="section-title">
      <div class="live-dot"></div>
      Live Flights
    </div>
    <div id="live-grid" class="live-grid">
      <div class="state-msg"><span class="spinner"></span> Loading flights…</div>
    </div>
  </div>

  <!-- Live Cockpit Feeds -->
  <div id="cockpit-feeds-section">
    <div class="section-title">
      <div class="live-dot"></div>
      Live Cockpit Feeds
    </div>
    <div class="cockpit-feeds-grid" id="cockpit-feeds-grid">
      <div class="state-msg"><span class="spinner"></span> Loading feeds…</div>
    </div>
  </div>
</main>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(v, fallback = 'N/A') { return (v != null && v !== '') ? v : fallback; }

function fmtTime(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  catch { return iso; }
}

function fmtDate(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return iso; }
}

function statusPill(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s.includes('active') || s.includes('en route') || s.includes('airborne'))
    return `<span class="status-pill status-active">In Air</span>`;
  if (s.includes('land') || s.includes('arriv'))
    return `<span class="status-pill status-landed">Landed</span>`;
  if (s.includes('cancel'))
    return `<span class="status-pill status-cancelled">Cancelled</span>`;
  return `<span class="status-pill status-scheduled">Scheduled</span>`;
}

function setBadge(id, ok) {
  const el = document.getElementById('badge-' + id);
  if (el) el.classList.toggle('ok', ok);
}

function setResults(html) {
  const el = document.getElementById('results');
  el.innerHTML = html;
  if (html) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── WEATHER CODES ────────────────────────────────────────────────────────────
function wxInfo(code) {
  if (code === 0)  return { icon: '☀️',  label: 'Clear Sky' };
  if (code <= 2)   return { icon: '⛅',  label: 'Partly Cloudy' };
  if (code === 3)  return { icon: '☁️',  label: 'Overcast' };
  if (code <= 48)  return { icon: '🌫️', label: 'Foggy' };
  if (code <= 55)  return { icon: '🌦️', label: 'Drizzle' };
  if (code <= 65)  return { icon: '🌧️', label: 'Rain' };
  if (code <= 75)  return { icon: '🌨️', label: 'Snow' };
  if (code <= 82)  return { icon: '🌦️', label: 'Showers' };
  if (code <= 86)  return { icon: '🌨️', label: 'Snow Showers' };
  if (code >= 95)  return { icon: '⛈️',  label: 'Thunderstorm' };
  return { icon: '🌡️', label: 'Unknown' };
}

// ─── COORD CACHE + GEOCODING ──────────────────────────────────────────────────
const _coordCache = {};
async function getCoords(iata) {
  if (!iata) return null;
  const code = iata.toUpperCase();
  if (AIRPORTS[code]) return AIRPORTS[code];
  if (_coordCache[code]) return _coordCache[code];
  try {
    const r = await fetch(`${CFG.GEO_BASE}/search?name=${encodeURIComponent(code + ' airport')}&count=1&language=en&format=json`);
    const j = await r.json();
    if (j.results?.[0]) {
      const c = { lat: j.results[0].latitude, lon: j.results[0].longitude };
      _coordCache[code] = c;
      return c;
    }
  } catch (_) {}
  return null;
}

// ─── WEATHER FETCH (at flight-relevant time) ──────────────────────────────────
async function getWeather(lat, lon, isoDatetime) {
  const today = new Date().toISOString().slice(0, 10);
  const date  = isoDatetime ? isoDatetime.slice(0, 10) : today;
  const useDate = date < today ? today : date;
  const targetHour = isoDatetime ? new Date(isoDatetime).getHours() : new Date().getHours();
  const params = 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation';

  try {
    const url = `${CFG.WX_BASE}/forecast?latitude=${lat}&longitude=${lon}` +
      `&hourly=${params}&temperature_unit=fahrenheit&wind_speed_unit=mph` +
      `&start_date=${useDate}&end_date=${useDate}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const h = j.hourly;
    if (!h) return null;

    let idx = h.time.findIndex(t => new Date(t).getHours() === targetHour);
    if (idx < 0) idx = Math.min(12, h.time.length - 1);

    setBadge('weather', true);
    return {
      temp:     Math.round(h.temperature_2m[idx]),
      feels:    Math.round(h.apparent_temperature[idx]),
      code:     h.weather_code[idx],
      wind:     Math.round(h.wind_speed_10m[idx]),
      humidity: Math.round(h.relative_humidity_2m[idx]),
      precip:   (h.precipitation[idx] ?? 0).toFixed(2),
    };
  } catch (_) { return null; }
}

// ─── WEATHER CARD HTML ────────────────────────────────────────────────────────
function wxCardHTML(wx, title, code, time) {
  const header = `<div class="wx-label">${title} — ${code}${time ? ' @ ' + fmtTime(time) : ''}</div>`;
  if (!wx) return `<div class="wx-card">${header}<div class="wx-na">Weather unavailable</div></div>`;
  const { icon, label } = wxInfo(wx.code);
  return `
    <div class="wx-card">
      ${header}
      <div class="wx-main">
        <div class="wx-icon">${icon}</div>
        <div>
          <div class="wx-temp">${wx.temp}°F</div>
          <div class="wx-cond">${label} · Feels ${wx.feels}°F</div>
        </div>
      </div>
      <div class="wx-details">
        <div class="wx-row"><span>Wind</span><span>${wx.wind} mph</span></div>
        <div class="wx-row"><span>Humidity</span><span>${wx.humidity}%</span></div>
        <div class="wx-row"><span>Precip</span><span>${wx.precip}"</span></div>
        <div class="wx-row"><span>WX Code</span><span>${wx.code}</span></div>
      </div>
    </div>`;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function progressBarHTML(p, telemetry, fid) {
  const pct = Math.min(100, Math.max(0, p.percentComplete));
  const milesLeft = (p.milesDirect - p.milesFlown).toLocaleString();
  const hElapsed = Math.floor(p.minutesElapsed / 60);
  const mElapsed = p.minutesElapsed % 60;
  const hTotal   = Math.floor(p.minutesTotal / 60);
  const mTotal   = p.minutesTotal % 60;
  const mRemain  = p.minutesTotal - p.minutesElapsed;
  const hRemain  = Math.floor(mRemain / 60);
  const minRemain = mRemain % 60;

  // Clamp plane icon so it's never off-edge
  const planePct = Math.min(97, Math.max(3, pct));

  return `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Departed</span>
        <span class="pct">${pct}% complete</span>
        <span>Arrived</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-plane" style="left:${planePct}%">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
          </svg>
        </div>
      </div>
      <div class="progress-stats">
        <span><span class="hi">${p.milesFlown.toLocaleString()} mi</span> flown</span>
        <span><span class="hi">${hElapsed}h ${mElapsed}m</span> elapsed · <span class="hi">${hRemain}h ${minRemain}m</span> remaining</span>
        <span><span class="hi">${milesLeft} mi</span> to go</span>
      </div>
    </div>
    <div class="data-grid">
      <div class="data-cell">
        <div class="data-label">Altitude</div>
        <div class="data-value" id="live-alt-${fid}">${telemetry.altitude.toLocaleString()} ft</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Speed</div>
        <div class="data-value" id="live-spd-${fid}">${telemetry.speed} mph</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Flight Time</div>
        <div class="data-value">${hTotal}h ${mTotal}m</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Distance</div>
        <div class="data-value">${p.milesDirect.toLocaleString()} mi</div>
      </div>
    </div>`;
}

// ─── COCKPIT VIEW HTML ────────────────────────────────────────────────────────
function cockpitViewHTML(f) {
  if (!f.cockpit) return '';
  const c  = f.cockpit;
  const id = f.flightId;

  // Build compass ring SVG content (ticks + cardinal labels)
  let compassInner = '';
  for (let deg = 0; deg < 360; deg += 10) {
    const rad     = (deg - 90) * Math.PI / 180;
    const isCard  = deg % 90 === 0;
    const isMaj   = deg % 30 === 0;
    const rI      = isCard ? 32 : (isMaj ? 36 : 40);
    const x1 = (50 + Math.cos(rad) * rI).toFixed(1);
    const y1 = (50 + Math.sin(rad) * rI).toFixed(1);
    const x2 = (50 + Math.cos(rad) * 46).toFixed(1);
    const y2 = (50 + Math.sin(rad) * 46).toFixed(1);
    compassInner += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${isCard ? '#3a5888' : '#1f2d4a'}" stroke-width="${isCard ? 2 : 1}"/>`;
  }
  [[0,'N','#ff4757'],[90,'E','#6b7a96'],[180,'S','#6b7a96'],[270,'W','#6b7a96']].forEach(([deg,lbl,clr]) => {
    const rad = (deg - 90) * Math.PI / 180;
    const x   = (50 + Math.cos(rad) * 25).toFixed(1);
    const y   = (50 + Math.sin(rad) * 25).toFixed(1);
    compassInner += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="bold" fill="${clr}" font-family="Courier New">${lbl}</text>`;
  });

  // Build VSI arc ticks
  let vsiInner = '';
  [-2000,-1500,-1000,-500,0,500,1000,1500,2000].forEach(v => {
    const ang = (v / 2000) * 90;
    const rad = (ang - 90) * Math.PI / 180;
    const rI  = v === 0 ? 28 : (Math.abs(v) === 2000 ? 34 : 39);
    const x1  = (50 + Math.cos(rad) * rI).toFixed(1);
    const y1  = (50 + Math.sin(rad) * rI).toFixed(1);
    const x2  = (50 + Math.cos(rad) * 46).toFixed(1);
    const y2  = (50 + Math.sin(rad) * 46).toFixed(1);
    const clr = v === 0 ? '#00aaff' : (Math.abs(v) >= 1500 ? '#ff4757' : '#1f2d4a');
    vsiInner += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${clr}" stroke-width="${v === 0 ? 2.5 : 1.5}"/>`;
  });
  // VSI axis labels
  [[90,'+2k'],[-90,'-2k'],[0,'0']].forEach(([ang,lbl]) => {
    const rad = (ang - 90) * Math.PI / 180;
    vsiInner += `<text x="${(50 + Math.cos(rad)*21).toFixed(1)}" y="${(50 + Math.sin(rad)*21).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="6" fill="#6b7a96" font-family="Courier New">${lbl}</text>`;
  });

  const vsiAngle   = Math.max(-90, Math.min(90, c.verticalSpeed / 2000 * 90));
  const pitchOff   = -(c.pitch || 0) * 3;
  const bankDeg    = c.bank || 0;
  const vsiSign    = c.verticalSpeed > 0 ? '+' : '';
  const bankSign   = bankDeg > 0 ? '+' : '';
  const pitchSign  = (c.pitch || 0) > 0 ? '+' : '';
  const hdg        = String(Math.round(c.heading)).padStart(3, '0');

  return `
    <div class="cockpit-section">
      <div class="section-title">
        <div class="live-dot"></div>
        Live Cockpit View
      </div>
      <div class="cockpit-hud">
        <div class="cockpit-primary">

          <!-- HSI / Compass -->
          <div class="cockpit-panel">
            <div class="cockpit-panel-label">HSI / Heading</div>
            <div class="cockpit-compass-wrap">
              <svg class="cockpit-compass-base" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="49" fill="#0e1525" stroke="#1f2d4a" stroke-width="1.5"/>
                <g id="cockpit-compass-${id}" transform="rotate(${-c.heading},50,50)">
                  ${compassInner}
                </g>
                <!-- Lubber triangle (fixed, top = current heading) -->
                <polygon points="50,3 47,12 53,12" fill="#ffab00"/>
                <!-- Center hub -->
                <circle cx="50" cy="50" r="11" fill="#0e1525" stroke="#1f2d4a" stroke-width="1"/>
                <text x="50" y="51" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#00aaff">✈</text>
              </svg>
              <div class="cockpit-readout-value" id="cockpit-hdg-${id}">${hdg}°</div>
            </div>
          </div>

          <!-- Attitude Indicator -->
          <div class="cockpit-panel">
            <div class="cockpit-panel-label">Attitude Indicator</div>
            <div class="cockpit-ai-wrap">
              <div class="cockpit-ai-clip">
                <div class="cockpit-ai-ball" id="cockpit-attitude-${id}"
                  style="transform:rotate(${bankDeg}deg) translateY(${pitchOff}px)">
                  <div class="cockpit-ai-sky"></div>
                  <div class="cockpit-ai-horizon"></div>
                  <div class="cockpit-ai-ground"></div>
                </div>
                <div class="cockpit-ai-wings">
                  <div class="wing-left"></div>
                  <div class="wing-dot"></div>
                  <div class="wing-right"></div>
                </div>
                <div class="cockpit-ai-center-dot"></div>
              </div>
              <div class="cockpit-ai-readout">
                <span>${bankSign}${bankDeg}° BNK</span>
                <span>${pitchSign}${c.pitch || 0}° PCH</span>
              </div>
            </div>
          </div>

          <!-- Vertical Speed Indicator -->
          <div class="cockpit-panel">
            <div class="cockpit-panel-label">Vertical Speed</div>
            <div class="cockpit-vsi-wrap">
              <svg class="cockpit-vsi-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="49" fill="#0e1525" stroke="#1f2d4a" stroke-width="1.5"/>
                ${vsiInner}
                <g id="cockpit-vsi-needle-${id}" transform="rotate(${vsiAngle.toFixed(1)},50,50)">
                  <line x1="50" y1="50" x2="50" y2="15" stroke="#00aaff" stroke-width="2.5" stroke-linecap="round"/>
                </g>
                <circle cx="50" cy="50" r="4" fill="#0e1525" stroke="#00aaff" stroke-width="1.5"/>
              </svg>
              <div class="cockpit-readout-value" id="cockpit-vsi-${id}">${vsiSign}${c.verticalSpeed} ft/min</div>
            </div>
          </div>

        </div>

        <!-- Secondary readout strip -->
        <div class="cockpit-secondary">
          <div class="cockpit-readout-cell">
            <div class="cockpit-readout-label">Mach</div>
            <div class="cockpit-readout-value" id="cockpit-mach-${id}">M${c.mach.toFixed(3)}</div>
          </div>
          <div class="cockpit-readout-cell">
            <div class="cockpit-readout-label">OAT</div>
            <div class="cockpit-readout-value" id="cockpit-oat-${id}">${c.oat}°C</div>
          </div>
          <div class="cockpit-readout-cell">
            <div class="cockpit-readout-label">Cabin Alt</div>
            <div class="cockpit-readout-value" id="cockpit-cabin-${id}">${c.cabinAlt.toLocaleString()} ft</div>
          </div>
          <div class="cockpit-readout-cell">
            <div class="cockpit-readout-label">Autopilot</div>
            <div class="cockpit-readout-value ap-active">${c.autopilot}</div>

// ─── FETCH LOCAL FLIGHT JSON ──────────────────────────────────────────────────
async function fetchFlight(id) {

    getCoords(dep.iata),
    getCoords(arr.iata),
  ]);
  const [depWx, arrWx] = await Promise.all([
    depCoords ? getWeather(depCoords.lat, depCoords.lon, depTime) : null,
    arrCoords ? getWeather(arrCoords.lat, arrCoords.lon, arrTime) : null,

  const depDelay = dep.delayMinutes > 0

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function searchFlight() {
  const raw = document.getElementById('flight-input').value.trim();
  if (!raw) return;
  const query = raw.replace(/\s+/g, '').toUpperCase();
  const fileId = ALIAS_MAP[query];

  if (!fileId) {
    setResults(`<div class="error-msg">⚠ No flight found for "${raw}". Try: DAL820, QF28, LY495, TK750, EDV4905, GTI64, N992DB</div>`);
    return;
  }

  setResults(`<div class="state-msg"><span class="spinner"></span> Loading flight data…</div>`);

  try {
    const f = await fetchFlight(fileId);
    setBadge('flights', true);
    const card = await buildDetailCard(f);
    setResults(card);
    initCockpitAnimations(f);
  } catch (err) {
    setResults(`<div class="error-msg">⚠ ${err.message}</div>`);
  }
}

function searchByAlias(id) {
  document.getElementById('flight-input').value = id;
  searchFlight();
}

// Enter key
document.getElementById('flight-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFlight();
});

// ─── ATC AUDIO PLAYER ─────────────────────────────────────────────────────────
let currentAudio = null;
let currentPlayerId = null;

function toggleATC(flightId) {
  const audio    = document.getElementById('audio-' + flightId);
  const player   = document.getElementById('atc-' + flightId);
  const btnPlay  = player.querySelector('.icon-play');
  const btnStop  = player.querySelector('.icon-stop');

  // Stop any other playing audio first
  if (currentAudio && currentAudio !== audio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    const prevPlayer = document.getElementById('atc-' + currentPlayerId);
    if (prevPlayer) {
      prevPlayer.classList.remove('playing');
      prevPlayer.querySelector('.icon-play').style.display = '';
      prevPlayer.querySelector('.icon-stop').style.display = 'none';
    }
  }

  if (audio.paused) {
    audio.currentTime = ATC_INFO[flightId]?.start ?? 0;
    audio.play();
    player.classList.add('playing');
    btnPlay.style.display = 'none';
    btnStop.style.display = '';
    currentAudio    = audio;
    currentPlayerId = flightId;
  } else {
    audio.pause();
    audio.currentTime = 0;
    player.classList.remove('playing');
    btnPlay.style.display = '';
    btnStop.style.display = 'none';
    currentAudio    = null;
    currentPlayerId = null;
  }

  // Auto-reset when track ends
  audio.onended = () => {
    player.classList.remove('playing');
    btnPlay.style.display = '';
    btnStop.style.display = 'none';
    currentAudio    = null;
    currentPlayerId = null;
  };
}

// ─── COCKPIT LIVE ANIMATION ───────────────────────────────────────────────────
let _cockpitTimer = null;

function initCockpitAnimations(f) {
  if (!f.cockpit) return;
  if (_cockpitTimer) clearInterval(_cockpitTimer);

  const id      = f.flightId;
  const base    = f.cockpit;
  const baseTel = f.telemetry;
  let t         = 0;
  let altRunning = baseTel.altitude;

  _cockpitTimer = setInterval(() => {
    t += 0.06;

    // ── Heading: slow sweep ±8° so compass visibly moves (~28s per cycle) ──
    const heading = (base.heading + Math.sin(t * 0.4) * 8 + 360) % 360;

    // ── VSI: moderate swing ──
    const vsi = base.verticalSpeed + Math.sin(t * 0.55) * 60 + Math.sin(t * 1.1) * 20;

    // ── Mach: small flutter ──
    const mach = base.mach + Math.sin(t * 0.38) * 0.002 + Math.sin(t * 0.9) * 0.001;

    // ── Bank / Pitch: gentle sway ──
    const bank  = (base.bank  || 0) + Math.sin(t * 0.25) * 2.5;
    const pitch = (base.pitch || 0) + Math.sin(t * 0.32) * 0.6;

    // ── Altitude: drifts with VSI, clamped ±400 ft ──
    altRunning += vsi / 545;
    if (Math.abs(altRunning - baseTel.altitude) > 400) altRunning = baseTel.altitude;
    const altClamped = Math.round(
      Math.max(baseTel.altitude - 400, Math.min(baseTel.altitude + 400, altRunning))
    );

    // ── Speed: flutter ±6 mph ──
    const speed = Math.round(baseTel.speed + Math.sin(t * 0.17) * 6);

    // ── OAT: ±2°C flutter ──
    const oat = Math.round(base.oat + Math.sin(t * 0.12) * 2);

    // ── Cabin Alt: ±80 ft drift ──
    const cabinAlt = Math.round(base.cabinAlt + Math.sin(t * 0.08) * 80);

    // ── N1: ±1.5% flutter ──
    const n1 = (base.n1 + Math.sin(t * 0.21) * 1.5).toFixed(1);

    // ── Update DOM ──
    const compassEl = document.getElementById('cockpit-compass-' + id);
    if (compassEl) compassEl.setAttribute('transform', `rotate(${(-heading).toFixed(2)},50,50)`);

    const hdgEl = document.getElementById('cockpit-hdg-' + id);
    if (hdgEl) hdgEl.textContent = String(Math.round(heading)).padStart(3, '0') + '°';

    const vsiAngle  = Math.max(-90, Math.min(90, vsi / 2000 * 90));
    const vsiNeedle = document.getElementById('cockpit-vsi-needle-' + id);
    if (vsiNeedle) vsiNeedle.setAttribute('transform', `rotate(${vsiAngle.toFixed(2)},50,50)`);

    const vsiEl = document.getElementById('cockpit-vsi-' + id);
    if (vsiEl) vsiEl.textContent = (vsi >= 0 ? '+' : '') + Math.round(vsi) + ' ft/min';

    const attEl = document.getElementById('cockpit-attitude-' + id);
    if (attEl) attEl.style.transform =
      `rotate(${bank.toFixed(2)}deg) translateY(${(-(pitch * 3)).toFixed(2)}px)`;

    const machEl = document.getElementById('cockpit-mach-' + id);
    if (machEl) machEl.textContent = 'M' + mach.toFixed(3);

    const altEl = document.getElementById('live-alt-' + id);
    if (altEl) altEl.textContent = altClamped.toLocaleString() + ' ft';

    const spdEl = document.getElementById('live-spd-' + id);
    if (spdEl) spdEl.textContent = speed + ' mph';

    const oatEl = document.getElementById('cockpit-oat-' + id);
    if (oatEl) oatEl.textContent = oat + '°C';

    const cabinEl = document.getElementById('cockpit-cabin-' + id);
    if (cabinEl) cabinEl.textContent = cabinAlt.toLocaleString() + ' ft';

    const n1El = document.getElementById('cockpit-n1-' + id);
    if (n1El) n1El.textContent = n1 + '%';

  }, 110);
}

// ─── STARFIELD BACKGROUND ─────────────────────────────────────────────────────
(function () {
  const canvas = document.createElement('canvas');
  canvas.id = 'starfield';
  document.body.prepend(canvas);
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 200 }, () => ({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.3 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.014 + 0.003,
      warm:  Math.random() > 0.8,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.phase += s.speed;
      const op = (Math.sin(s.phase) + 1) / 2 * 0.55 + 0.05;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.warm
        ? `rgba(255,220,140,${op})`
        : `rgba(170,210,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  initStars();
  draw();
  window.addEventListener('resize', initStars);
})();

      dot.className = 'cursor-trail';
      const sz = (Math.random() * 4 + 3).toFixed(1) + 'px';
      dot.style.cssText = `left:${x}px;top:${y}px;width:${sz};height:${sz};background:${COLORS[Math.floor(Math.random()*COLORS.length)]}`;
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 520);
      prevX = x; prevY = y;
    }
  });

  // Boost glow when hovering interactive elements
  const HOT = '.live-card,.btn,button,.data-cell,.wx-card,a,.api-badge';
  document.addEventListener('mouseover', e => {
    if (e.target.closest(HOT)) {
      plane.style.filter    = 'drop-shadow(0 0 14px #00aaff) drop-shadow(0 0 4px #fff)';
      plane.style.transform = 'translate(-50%,-50%) scale(1.25)';
    } else {
      plane.style.filter    = 'drop-shadow(0 0 8px rgba(0,170,255,0.9))';
      plane.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  });
})();

// ─── HERO FLYBY PLANE ─────────────────────────────────────────────────────────
(function () {
  const hero = document.querySelector('.hero');
  if (!hero) return;
  const el = document.createElement('div');
  el.className = 'flying-plane-hero';
  el.innerHTML = `<svg width="90" height="90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
  </svg>`;
  hero.appendChild(el);
})();

// ─── SCROLL REVEAL ────────────────────────────────────────────────────────────
(function () {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.05 });

  function observe(root = document) {
    root.querySelectorAll('.live-card:not(.reveal), .search-box:not(.reveal)').forEach(el => {
      el.classList.add('reveal');
      io.observe(el);
    });
  }
  observe();

  const mo = new MutationObserver(() => observe());
  mo.observe(document.getElementById('live-grid'), { childList: true });
  mo.observe(document.getElementById('results'),   { childList: true });
})();

// ─── CLICK SPARK BURST ────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const colors = ['#00aaff', '#ffab00', '#00e676', '#fff'];
  for (let i = 0; i < 7; i++) {
    const spark = document.createElement('div');
    const angle = (i / 7) * Math.PI * 2;
    const dist  = 22 + Math.random() * 22;
    spark.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
      width:5px;height:5px;border-radius:50%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${e.clientX}px;top:${e.clientY}px;`;
    document.body.appendChild(spark);
    spark.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${(Math.cos(angle)*dist).toFixed(1)}px), calc(-50% + ${(Math.sin(angle)*dist).toFixed(1)}px)) scale(0.1)`, opacity: 0 }
    ], { duration: 480, easing: 'ease-out', fill: 'forwards' })
    .finished.then(() => spark.remove());
  }
});
</script>
</body>
