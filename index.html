<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightPulse — Live Flight Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
    </svg>
    FlightPulse
  </div>
  <div class="api-status">
    <div class="api-badge" id="badge-flights"><div class="dot"></div>Live Flights</div>
    <div class="api-badge" id="badge-weather"><div class="dot"></div>Weather</div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="hero">
    <h1>Live Flight Tracker</h1>
    <p>Search a flight number below, or browse live flights currently in the air.</p>
  </div>

  <div class="search-box">
    <label>Flight Number</label>
    <div class="search-row">
      <input type="text" id="flight-input" placeholder="e.g. DAL820, QF28, LY495, N992DB" autocomplete="off" />
      <button class="btn" onclick="searchFlight()">Search</button>
    </div>
  </div>

  <!-- Search results appear here -->
  <div id="results"></div>

  <!-- Live flights feed -->
  <div id="live-section">
    <div class="section-title">
      <div class="live-dot"></div>
      Live Flights
    </div>
    <div id="live-grid" class="live-grid">
      <div class="state-msg"><span class="spinner"></span> Loading flights…</div>
    </div>
  </div>
</main>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────

  WX_BASE:  'https://api.open-meteo.com/v1',
  GEO_BASE: 'https://geocoding-api.open-meteo.com/v1',
  FLIGHTS_DIR: './flights/',
};

// ─── FLIGHT ALIASES ───────────────────────────────────────────────────────────
// Maps any search term → JSON file ID

  'EDV4905':'EDV4905','9E4905':'EDV4905','ENDEAVOR4905':'EDV4905',

  'THY750':'THY750','TK750':'THY750','TURKAIR750':'THY750',
  'N992DB':'N992DB','ROCKETMAN':'N992DB',
};
const ALL_FLIGHT_IDS = ['DAL820','GTI64','ELY495','EDV4905','QFA28','THY750','N992DB'];

// ─── AIRPORT COORDS ───────────────────────────────────────────────────────────
const AIRPORTS = {

  FLL:{lat:26.0726,lon:-80.1527},HNL:{lat:21.3245,lon:-157.9251},IAD:{lat:38.9531,lon:-77.4565},
  IAH:{lat:29.9902,lon:-95.3368},JFK:{lat:40.6413,lon:-73.7781},LAS:{lat:36.0840,lon:-115.1537},

  // South America
  VCP:{lat:-23.0075,lon:-47.1345},LIM:{lat:-12.0219,lon:-77.1143},SCL:{lat:-33.3928,lon:-70.7858},

  LHR:{lat:51.4700,lon:-0.4543},LGW:{lat:51.1537,lon:-0.1821},CDG:{lat:49.0097,lon:2.5479},

  MAD:{lat:40.4719,lon:-3.5626},BCN:{lat:41.2974,lon:2.0833},FCO:{lat:41.7999,lon:12.2462},

  // Asia / Pacific
  ISB:{lat:33.5497,lon:72.8116},SIN:{lat:1.3644,lon:103.9915},HKG:{lat:22.3080,lon:113.9185},
  NRT:{lat:35.7720,lon:140.3929},ICN:{lat:37.4602,lon:126.4407},SYD:{lat:-33.9399,lon:151.1753},
  MEL:{lat:-37.6690,lon:144.8410},
  // Canada
  YYZ:{lat:43.6777,lon:-79.6248},YVR:{lat:49.1947,lon:-123.1792},

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(v, fallback = 'N/A') { return (v != null && v !== '') ? v : fallback; }

function fmtTime(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  catch { return iso; }
}

function fmtDate(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return iso; }
}

function statusPill(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s.includes('active') || s.includes('en route') || s.includes('airborne'))
    return `<span class="status-pill status-active">In Air</span>`;
  if (s.includes('land') || s.includes('arriv'))
    return `<span class="status-pill status-landed">Landed</span>`;
  if (s.includes('cancel'))
    return `<span class="status-pill status-cancelled">Cancelled</span>`;
  return `<span class="status-pill status-scheduled">Scheduled</span>`;
}

function setBadge(id, ok) {
  const el = document.getElementById('badge-' + id);
  if (el) el.classList.toggle('ok', ok);
}

function setResults(html) {
  const el = document.getElementById('results');
  el.innerHTML = html;
  if (html) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── WEATHER CODES ────────────────────────────────────────────────────────────
function wxInfo(code) {
  if (code === 0)  return { icon: '☀️',  label: 'Clear Sky' };
  if (code <= 2)   return { icon: '⛅',  label: 'Partly Cloudy' };
  if (code === 3)  return { icon: '☁️',  label: 'Overcast' };
  if (code <= 48)  return { icon: '🌫️', label: 'Foggy' };
  if (code <= 55)  return { icon: '🌦️', label: 'Drizzle' };
  if (code <= 65)  return { icon: '🌧️', label: 'Rain' };
  if (code <= 75)  return { icon: '🌨️', label: 'Snow' };
  if (code <= 82)  return { icon: '🌦️', label: 'Showers' };
  if (code <= 86)  return { icon: '🌨️', label: 'Snow Showers' };
  if (code >= 95)  return { icon: '⛈️',  label: 'Thunderstorm' };
  return { icon: '🌡️', label: 'Unknown' };
}

// ─── COORD CACHE + GEOCODING ──────────────────────────────────────────────────
const _coordCache = {};
async function getCoords(iata) {
  if (!iata) return null;
  const code = iata.toUpperCase();
  if (AIRPORTS[code]) return AIRPORTS[code];
  if (_coordCache[code]) return _coordCache[code];
  try {
    const r = await fetch(`${CFG.GEO_BASE}/search?name=${encodeURIComponent(code + ' airport')}&count=1&language=en&format=json`);
    const j = await r.json();
    if (j.results?.[0]) {
      const c = { lat: j.results[0].latitude, lon: j.results[0].longitude };
      _coordCache[code] = c;
      return c;
    }
  } catch (_) {}
  return null;
}

// ─── WEATHER FETCH (at flight-relevant time) ──────────────────────────────────
async function getWeather(lat, lon, isoDatetime) {
  const today = new Date().toISOString().slice(0, 10);
  const date  = isoDatetime ? isoDatetime.slice(0, 10) : today;
  const useDate = date < today ? today : date;
  const targetHour = isoDatetime ? new Date(isoDatetime).getHours() : new Date().getHours();
  const params = 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation';

  try {
    const url = `${CFG.WX_BASE}/forecast?latitude=${lat}&longitude=${lon}` +
      `&hourly=${params}&temperature_unit=fahrenheit&wind_speed_unit=mph` +
      `&start_date=${useDate}&end_date=${useDate}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const h = j.hourly;
    if (!h) return null;

    let idx = h.time.findIndex(t => new Date(t).getHours() === targetHour);
    if (idx < 0) idx = Math.min(12, h.time.length - 1);

    setBadge('weather', true);
    return {
      temp:     Math.round(h.temperature_2m[idx]),
      feels:    Math.round(h.apparent_temperature[idx]),
      code:     h.weather_code[idx],
      wind:     Math.round(h.wind_speed_10m[idx]),
      humidity: Math.round(h.relative_humidity_2m[idx]),
      precip:   (h.precipitation[idx] ?? 0).toFixed(2),
    };
  } catch (_) { return null; }
}

// ─── WEATHER CARD HTML ────────────────────────────────────────────────────────
function wxCardHTML(wx, title, code, time) {
  const header = `<div class="wx-label">${title} — ${code}${time ? ' @ ' + fmtTime(time) : ''}</div>`;
  if (!wx) return `<div class="wx-card">${header}<div class="wx-na">Weather unavailable</div></div>`;
  const { icon, label } = wxInfo(wx.code);
  return `
    <div class="wx-card">
      ${header}
      <div class="wx-main">
        <div class="wx-icon">${icon}</div>
        <div>
          <div class="wx-temp">${wx.temp}°F</div>
          <div class="wx-cond">${label} · Feels ${wx.feels}°F</div>
        </div>
      </div>
      <div class="wx-details">
        <div class="wx-row"><span>Wind</span><span>${wx.wind} mph</span></div>
        <div class="wx-row"><span>Humidity</span><span>${wx.humidity}%</span></div>
        <div class="wx-row"><span>Precip</span><span>${wx.precip}"</span></div>
        <div class="wx-row"><span>WX Code</span><span>${wx.code}</span></div>
      </div>
    </div>`;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function progressBarHTML(p, telemetry) {
  const pct = Math.min(100, Math.max(0, p.percentComplete));
  const milesLeft = (p.milesDirect - p.milesFlown).toLocaleString();
  const hElapsed = Math.floor(p.minutesElapsed / 60);
  const mElapsed = p.minutesElapsed % 60;
  const hTotal   = Math.floor(p.minutesTotal / 60);
  const mTotal   = p.minutesTotal % 60;
  const mRemain  = p.minutesTotal - p.minutesElapsed;
  const hRemain  = Math.floor(mRemain / 60);
  const minRemain = mRemain % 60;

  // Clamp plane icon so it's never off-edge
  const planePct = Math.min(97, Math.max(3, pct));

  return `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Departed</span>
        <span class="pct">${pct}% complete</span>
        <span>Arrived</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-plane" style="left:${planePct}%">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
          </svg>
        </div>
      </div>
      <div class="progress-stats">
        <span><span class="hi">${p.milesFlown.toLocaleString()} mi</span> flown</span>
        <span><span class="hi">${hElapsed}h ${mElapsed}m</span> elapsed · <span class="hi">${hRemain}h ${minRemain}m</span> remaining</span>
        <span><span class="hi">${milesLeft} mi</span> to go</span>
      </div>
    </div>
    <div class="data-grid">
      <div class="data-cell">
        <div class="data-label">Altitude</div>
        <div class="data-value">${telemetry.altitude.toLocaleString()} ft</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Speed</div>
        <div class="data-value">${telemetry.speed} mph</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Flight Time</div>
        <div class="data-value">${hTotal}h ${mTotal}m</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Distance</div>
        <div class="data-value">${p.milesDirect.toLocaleString()} mi</div>
      </div>
    </div>`;
}

// ─── FETCH LOCAL FLIGHT JSON ──────────────────────────────────────────────────
async function fetchFlight(id) {
  const r = await fetch(`${CFG.FLIGHTS_DIR}${id}.json`);
  if (!r.ok) throw new Error(`Flight file not found for "${id}"`);
  return r.json();
}

// ─── BUILD FULL DETAIL CARD ───────────────────────────────────────────────────
async function buildDetailCard(f) {
  const dep = f.departure;
  const arr = f.arrival;

  const depTime = dep.actualGate || dep.scheduledGate;
  const arrTime = arr.estimatedGate || arr.scheduledGate;

  // Fetch coords + weather in parallel at flight-specific times
  const [depCoords, arrCoords] = await Promise.all([
    getCoords(dep.iata),
    getCoords(arr.iata),
  ]);
  const [depWx, arrWx] = await Promise.all([
    depCoords ? getWeather(depCoords.lat, depCoords.lon, depTime) : null,
    arrCoords ? getWeather(arrCoords.lat, arrCoords.lon, arrTime) : null,
  ]);

  const depDelay = dep.delayMinutes > 0
    ? `<span class="delay-tag"> +${dep.delayMinutes}m</span>`
    : dep.delayMinutes < 0
      ? `<span class="early-tag"> ${dep.delayMinutes}m early</span>`
      : '';
  const arrDelay = arr.delayMinutes > 0
    ? `<span class="delay-tag"> +${arr.delayMinutes}m</span>`
    : arr.delayMinutes < 0
      ? `<span class="early-tag"> ${Math.abs(arr.delayMinutes)}m early</span>`
      : '';

  const depGateInfo = dep.terminal || dep.gate
    ? `${dep.terminal ? 'T' + dep.terminal : ''} ${dep.gate ? '· G' + dep.gate : ''}`.trim()
    : 'N/A';
  const arrGateInfo = arr.terminal || arr.gate
    ? `${arr.terminal ? 'T' + arr.terminal : ''} ${arr.gate ? '· G' + arr.gate : ''}`.trim()
    : 'N/A';

  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="flight-id">${f.flightId}</div>
          <div class="airline-name">${f.airline}</div>
        </div>
        ${statusPill(f.status)}
      </div>

      <div class="route-bar">
        <div class="airport-col">
          <div class="airport-code">${dep.iata}</div>
          <div class="airport-name">${dep.city}</div>
          <div class="airport-time">${fmtTime(depTime)}${depDelay}</div>
        </div>
        <div class="route-mid">
          <hr />
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
          </svg>
          <hr />
        </div>
        <div class="airport-col" style="text-align:right">
          <div class="airport-code">${arr.iata}</div>
          <div class="airport-name">${arr.city}</div>
          <div class="airport-time">${fmtTime(arrTime)}${arrDelay}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin:1.2rem 0;align-items:stretch">
        <div style="display:flex;flex-direction:column">
          <div class="section-title">Route Map</div>
          <img src="images/${f.flightId}_map.png" style="width:100%;flex:1;min-height:0;object-fit:${'DAL820,ELY495,EDV4905,QFA28'.includes(f.flightId) ? 'contain' : 'cover'};background:${'DAL820,ELY495,EDV4905,QFA28'.includes(f.flightId) ? 'var(--surface2)' : 'transparent'};border-radius:8px;border:1px solid var(--border);display:block" />
        </div>
        <div style="display:flex;flex-direction:column;gap:.85rem">
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div class="section-title">Altitude / Speed Graph</div>
            <img src="images/${f.flightId}_graph.png" style="width:100%;flex:1;min-height:0;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block" />
          </div>
          <div style="display:flex;flex-direction:column;flex:1;min-height:0">
            <div class="section-title">Aircraft</div>
            <img src="images/${f.flightId}_plane.png" style="width:100%;flex:1;min-height:0;object-fit:contain;object-position:center;border-radius:8px;border:1px solid var(--border);display:block;background:var(--surface2)" />
          </div>
        </div>
      </div>

      ${progressBarHTML(f.progress, f.telemetry)}

      <div class="data-grid" style="margin-top:.5rem">
        <div class="data-cell">
          <div class="data-label">Date</div>
          <div class="data-value">${fmtDate(f.date)}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Aircraft</div>
          <div class="data-value">${f.aircraft.code}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Dep Gate</div>
          <div class="data-value">${depGateInfo}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Arr Gate</div>
          <div class="data-value">${arrGateInfo}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Dep Taxi</div>
          <div class="data-value">${dep.taxiMinutes != null ? dep.taxiMinutes + ' min' : 'N/A'}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Arr Taxi</div>
          <div class="data-value">${arr.taxiMinutes != null ? arr.taxiMinutes + ' min' : 'N/A'}</div>
        </div>
      </div>

      ${f.route && f.route !== 'Direct' ? `
      <div class="data-cell" style="margin-bottom:1rem;font-size:.75rem;font-family:'Courier New',monospace;color:var(--muted);word-break:break-all">
        <div class="data-label" style="margin-bottom:.3rem">Route</div>
        ${f.route}
      </div>` : ''}

      <div class="wx-strip">
        ${wxCardHTML(depWx, 'Departure Weather', dep.iata, depTime)}
        ${wxCardHTML(arrWx, 'Arrival Weather', arr.iata, arrTime)}
      </div>
    </div>`;
}

// ─── BUILD COMPACT LIVE CARD ──────────────────────────────────────────────────
function buildLiveCard(f) {
  const pct = Math.min(100, Math.max(0, f.progress.percentComplete));
  const planePct = Math.min(97, Math.max(3, pct));

  const dep = f.departure;
  const arr = f.arrival;
  const depTime = dep.actualGate || dep.scheduledGate;
  const arrTime = arr.estimatedGate || arr.scheduledGate;

  return `
    <div class="live-card" onclick="searchByAlias('${f.flightId}')">
      <div class="live-card-header">
        <div>
          <div class="flight-id-small">${f.flightId}</div>
          <div class="airline-name">${f.airline}</div>
        </div>
        ${statusPill(f.status)}
      </div>
      <div class="live-route-compact">
        <div>
          <div class="airport-code-sm">${dep.iata}</div>
          <div style="font-size:.7rem;color:var(--muted)">${fmtTime(depTime)}</div>
        </div>
        <div class="dash"></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
        <div class="dash"></div>
        <div style="text-align:right">
          <div class="airport-code-sm">${arr.iata}</div>
          <div style="font-size:.7rem;color:var(--muted)">${fmtTime(arrTime)}</div>
        </div>
      </div>

      <!-- Mini progress bar -->
      <div style="position:relative;height:3px;background:var(--border);border-radius:2px;margin:.8rem 0 .4rem">
        <div style="position:absolute;top:0;left:0;height:100%;width:${pct}%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px"></div>
        <div style="position:absolute;top:50%;left:${planePct}%;transform:translate(-50%,-50%)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
          </svg>
        </div>
      </div>

      <div class="live-stats-row">
        <span><span class="val">${pct}%</span> done</span>
        <span><span class="val">${f.telemetry.altitude.toLocaleString()}</span> ft</span>
        <span><span class="val">${f.telemetry.speed}</span> mph</span>
        <span><span class="val">${f.aircraft.code}</span></span>
      </div>
    </div>`;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function searchFlight() {
  const raw = document.getElementById('flight-input').value.trim();
  if (!raw) return;
  const query = raw.replace(/\s+/g, '').toUpperCase();
  const fileId = ALIAS_MAP[query];

  if (!fileId) {
    setResults(`<div class="error-msg">⚠ No flight found for "${raw}". Try: DAL820, QF28, LY495, TK750, EDV4905, GTI64, N992DB</div>`);
    return;
  }

  setResults(`<div class="state-msg"><span class="spinner"></span> Loading flight data…</div>`);

  try {
    const f = await fetchFlight(fileId);
    setBadge('flights', true);
    const card = await buildDetailCard(f);
    setResults(card);
  } catch (err) {
    setResults(`<div class="error-msg">⚠ ${err.message}</div>`);
  }
}

function searchByAlias(id) {
  document.getElementById('flight-input').value = id;
  searchFlight();
}

// Enter key
document.getElementById('flight-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFlight();
});

// ─── LOAD LIVE FLIGHTS GRID ───────────────────────────────────────────────────
async function loadLiveGrid() {
  const grid = document.getElementById('live-grid');
  try {
    const flights = await Promise.all(ALL_FLIGHT_IDS.map(id => fetchFlight(id)));
    setBadge('flights', true);
    grid.innerHTML = flights.map(buildLiveCard).join('');
  } catch (err) {
    grid.innerHTML = `<div class="error-msg">⚠ Could not load live flights: ${err.message}<br><small>If opening as a local file, serve with a simple HTTP server (e.g. <code>npx serve .</code>)</small></div>`;
  }
}

// ─── STARTUP ──────────────────────────────────────────────────────────────────
(async () => {

// ─── STARFIELD BACKGROUND ─────────────────────────────────────────────────────
(function () {
  const canvas = document.createElement('canvas');
  canvas.id = 'starfield';
  document.body.prepend(canvas);
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({ length: 200 }, () => ({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.3 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.014 + 0.003,
      warm:  Math.random() > 0.8,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.phase += s.speed;
      const op = (Math.sin(s.phase) + 1) / 2 * 0.55 + 0.05;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.warm
        ? `rgba(255,220,140,${op})`
        : `rgba(170,210,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  initStars();
  draw();
  window.addEventListener('resize', initStars);
})();

// ─── CUSTOM AIRPLANE CURSOR ───────────────────────────────────────────────────
(function () {
  const PLANE_SVG = `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block;transform:rotate(-45deg)">
    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
  </svg>`;

  const plane = document.createElement('div');
  plane.className = 'cursor-plane';
  plane.innerHTML = PLANE_SVG;
  document.body.appendChild(plane);

  let prevX = -500, prevY = -500;
  const COLORS = ['rgba(0,170,255,0.75)', 'rgba(0,230,118,0.5)', 'rgba(255,171,0,0.4)'];

  document.addEventListener('mousemove', e => {
    const x = e.clientX, y = e.clientY;
    plane.style.left = x + 'px';
    plane.style.top  = y + 'px';

    const dx = x - prevX, dy = y - prevY;
    if (dx * dx + dy * dy > 64) {
      const dot = document.createElement('div');
      dot.className = 'cursor-trail';
      const sz = (Math.random() * 4 + 3).toFixed(1) + 'px';
      dot.style.cssText = `left:${x}px;top:${y}px;width:${sz};height:${sz};background:${COLORS[Math.floor(Math.random()*COLORS.length)]}`;
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 520);
      prevX = x; prevY = y;
    }
  });

  // Boost glow when hovering interactive elements
  const HOT = '.live-card,.btn,button,.data-cell,.wx-card,a,.api-badge';
  document.addEventListener('mouseover', e => {
    if (e.target.closest(HOT)) {
      plane.style.filter    = 'drop-shadow(0 0 14px #00aaff) drop-shadow(0 0 4px #fff)';
      plane.style.transform = 'translate(-50%,-50%) scale(1.25)';
    } else {
      plane.style.filter    = 'drop-shadow(0 0 8px rgba(0,170,255,0.9))';
      plane.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  });
})();

    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>

// ─── SCROLL REVEAL ────────────────────────────────────────────────────────────
(function () {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.05 });

  function observe(root = document) {
    root.querySelectorAll('.live-card:not(.reveal), .search-box:not(.reveal)').forEach(el => {
      el.classList.add('reveal');
      io.observe(el);
    });
  }
  observe();

  const mo = new MutationObserver(() => observe());
  mo.observe(document.getElementById('live-grid'), { childList: true });
  mo.observe(document.getElementById('results'),   { childList: true });
})();

// ─── CLICK SPARK BURST ────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  const colors = ['#00aaff', '#ffab00', '#00e676', '#fff'];
  for (let i = 0; i < 7; i++) {
    const spark = document.createElement('div');
    const angle = (i / 7) * Math.PI * 2;
    const dist  = 22 + Math.random() * 22;
    spark.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
      width:5px;height:5px;border-radius:50%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${e.clientX}px;top:${e.clientY}px;`;
    document.body.appendChild(spark);
    spark.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(calc(-50% + ${(Math.cos(angle)*dist).toFixed(1)}px), calc(-50% + ${(Math.sin(angle)*dist).toFixed(1)}px)) scale(0.1)`, opacity: 0 }
    ], { duration: 480, easing: 'ease-out', fill: 'forwards' })
    .finished.then(() => spark.remove());
  }
});
</script>
