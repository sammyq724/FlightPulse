<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightPulse — Live Flight Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070b14; --surface: #0e1525; --surface2: #151e33; --border: #1f2d4a;
      --blue: #00aaff; --green: #00e676; --amber: #ffab00; --red: #ff4757;
      --text: #e8eef8; --muted: #6b7a96; --radius: 12px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: .6rem; font-size: 1.35rem; font-weight: 700; color: var(--blue); }
    .api-status { display: flex; gap: .7rem; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; }
    .api-badge {
      display: flex; align-items: center; gap: .3rem; color: var(--muted);
      padding: .28rem .6rem; background: var(--surface2); border-radius: 6px;
      border: 1px solid var(--border); transition: color .3s;
    }
    .api-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); transition: background .4s; }
    .api-badge.ok .dot { background: var(--green); }
    .api-badge.ok { color: var(--text); }

    /* ── Page body ── */
    main { padding: 2rem; max-width: 1040px; margin: 0 auto; }
    .hero { text-align: center; padding: 2rem 0 1.5rem; }
    .hero h1 { font-size: 2rem; margin-bottom: .4rem; color: var(--amber); }
    .hero p { color: var(--muted); font-size: .95rem; }

    /* ── Search box ── */
    .search-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.4rem; margin-bottom: 2rem;
    }
    .search-box label { display: block; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .8rem; }
    .search-row { display: flex; gap: .7rem; flex-wrap: wrap; }
    .search-row input {
      flex: 1; min-width: 180px; padding: .75rem 1rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .95rem; outline: none; transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--amber); }
    .search-row input::placeholder { color: var(--muted); }
    .btn {
      padding: .75rem 1.8rem; border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 700; cursor: pointer;
      background: var(--amber); color: #000; letter-spacing: .04em;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }

    /* ── Section header ── */
    .section-title {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .12em;
      color: var(--muted); margin-bottom: 1rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.7); }
    }

    /* ── Flight Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .flight-id { font-size: 1.6rem; font-weight: 700; letter-spacing: .06em; font-family: 'Courier New', monospace; }
    .flight-id-small { font-size: 1.1rem; font-weight: 700; letter-spacing: .06em; font-family: 'Courier New', monospace; }
    .airline-name { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    .status-pill { padding: .28rem .9rem; border-radius: 99px; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .status-scheduled { background: rgba(255,171,0,.15); color: var(--amber); border: 1px solid rgba(255,171,0,.3); }
    .status-active    { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
    .status-landed    { background: rgba(107,122,150,.15); color: var(--muted); border: 1px solid var(--border); }
    .status-cancelled { background: rgba(255,71,87,.15); color: var(--red); border: 1px solid rgba(255,71,87,.3); }

    /* ── Route bar ── */
    .route-bar {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.2rem; padding: 1rem;
      background: var(--surface2); border-radius: 8px; border: 1px solid var(--border);
    }
    .airport-col { min-width: 0; }
    .airport-code { font-size: 2rem; font-weight: 700; font-family: 'Courier New', monospace; }
    .airport-code-sm { font-size: 1.3rem; font-weight: 700; font-family: 'Courier New', monospace; }
    .airport-name { font-size: .75rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .airport-time { font-size: .85rem; margin-top: 5px; }
    .delay-tag { color: var(--red); font-size: .78rem; }
    .early-tag { color: var(--green); font-size: .78rem; }
    .route-mid { flex: 1; display: flex; align-items: center; gap: .5rem; color: var(--muted); min-width: 60px; }
    .route-mid hr { flex: 1; border: none; border-top: 1px dashed var(--border); }

    /* ── Progress Bar ── */
    .progress-wrap { margin: 1.2rem 0; }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: .68rem; color: var(--muted);
      font-family: 'Courier New', monospace;
      margin-bottom: .5rem;
    }
    .progress-labels .pct { color: var(--blue); font-weight: 700; }
    .progress-track {
      position: relative;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 1rem 0 .3rem;
    }
    .progress-fill {
      position: absolute; top: 0; left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 2px;
      transition: width .4s ease;
    }
    .progress-plane {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      line-height: 1;
      filter: drop-shadow(0 0 5px rgba(0,170,255,.8));
    }
    .progress-plane svg { display: block; }
    .progress-stats {
      display: flex; justify-content: space-between;
      font-size: .7rem; color: var(--muted); margin-top: .5rem;
    }
    .progress-stats span { font-family: 'Courier New', monospace; }
    .progress-stats .hi { color: var(--text); font-weight: 600; }

    /* ── Data grid ── */
    .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: .85rem; margin-bottom: 1rem; }
    .data-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .85rem; }
    .data-label { font-size: .67rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .35rem; }
    .data-value { font-size: 1rem; font-weight: 600; font-family: 'Courier New', monospace; }
    .data-value.warn { color: var(--red); }
    .data-value.ok   { color: var(--green); }

    /* ── Weather strip ── */
    .wx-strip { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; margin-top: .2rem; }
    @media (max-width: 600px) { .wx-strip { grid-template-columns: 1fr; } }
    .wx-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
    .wx-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .6rem; }
    .wx-main { display: flex; align-items: center; gap: .75rem; margin-bottom: .55rem; }
    .wx-icon { font-size: 2.1rem; line-height: 1; }
    .wx-temp { font-size: 1.75rem; font-weight: 700; font-family: 'Courier New', monospace; }
    .wx-cond { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .wx-details { display: grid; grid-template-columns: 1fr 1fr; gap: .35rem .8rem; font-size: .78rem; }
    .wx-row { display: flex; justify-content: space-between; }
    .wx-row span:first-child { color: var(--muted); }
    .wx-row span:last-child { font-weight: 600; font-family: 'Courier New', monospace; }
    .wx-na { color: var(--muted); font-size: .82rem; padding: .3rem 0; }

    /* ── Live grid (compact cards) ── */
    .live-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .live-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem;
      cursor: pointer; transition: border-color .2s, transform .15s;
      animation: fadeIn .3s ease;
    }
    .live-card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .live-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: .7rem; }
    .live-route-compact { display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; }
    .live-route-compact .dash { flex: 1; border: none; border-top: 1px dashed var(--border); }
    .live-stats-row { display: flex; gap: 1rem; font-size: .72rem; color: var(--muted); margin-top: .5rem; }
    .live-stats-row span { font-family: 'Courier New', monospace; }
    .live-stats-row .val { color: var(--text); font-weight: 600; }

    /* ── States ── */
    .state-msg { text-align: center; padding: 3rem; color: var(--muted); font-size: .92rem; }
    .state-msg .icon { font-size: 2.5rem; margin-bottom: .8rem; }
    .error-msg {
      background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3);
      border-radius: 8px; padding: 1rem 1.2rem; color: var(--red);
      font-size: .88rem; line-height: 1.6;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--amber);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header { padding: .9rem 1rem; }
      .api-status { display: none; }
      main { padding: 1rem; }
      .airport-code { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 3L13 6.5l-8.2-1.8L4 6l7 4-3 3-2-.5L4 14l4 2 2 4 2-1 .5-2 3-3 4 7z"/>
    </svg>
    FlightPulse
  </div>
  <div class="api-status">
    <div class="api-badge" id="badge-flights"><div class="dot"></div>Live Flights</div>
    <div class="api-badge" id="badge-weather"><div class="dot"></div>Weather</div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="hero">
    <h1>Live Flight Tracker</h1>
    <p>Search a flight number below, or browse live flights currently in the air.</p>
  </div>

  <div class="search-box">
    <label>Flight Number</label>
    <div class="search-row">
      <input type="text" id="flight-input" placeholder="e.g. DAL820, QF28, LY495, N992DB" autocomplete="off" />
      <button class="btn" onclick="searchFlight()">Search</button>
    </div>
  </div>

  <!-- Search results appear here -->
  <div id="results"></div>

  <!-- Live flights feed -->
  <div id="live-section">
    <div class="section-title">
      <div class="live-dot"></div>
      Live Flights
    </div>
    <div id="live-grid" class="live-grid">
      <div class="state-msg"><span class="spinner"></span> Loading flights…</div>
    </div>
  </div>
</main>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CFG = {
  WX_BASE:  'https://api.open-meteo.com/v1',
  GEO_BASE: 'https://geocoding-api.open-meteo.com/v1',
  FLIGHTS_DIR: './flights/',
};

// ─── FLIGHT ALIASES ───────────────────────────────────────────────────────────
// Maps any search term → JSON file ID
const ALIAS_MAP = {
  'DAL820':'DAL820','DL820':'DAL820','DELTA820':'DAL820',
  'GTI64':'GTI64','GT164':'GTI64','GIANT64':'GTI64',
  'ELY495':'ELY495','LY495':'ELY495','ELAL495':'ELY495',
  'EDV4905':'EDV4905','9E4905':'EDV4905','ENDEAVOR4905':'EDV4905',
  'QFA28':'QFA28','QF28':'QFA28','QANTAS28':'QFA28',
  'THY750':'THY750','TK750':'THY750','TURKAIR750':'THY750',
  'N992DB':'N992DB','ROCKETMAN':'N992DB',
};
const ALL_FLIGHT_IDS = ['DAL820','GTI64','ELY495','EDV4905','QFA28','THY750','N992DB'];

// ─── AIRPORT COORDS ───────────────────────────────────────────────────────────
const AIRPORTS = {
  ATL:{lat:33.6407,lon:-84.4277},BOS:{lat:42.3656,lon:-71.0096},BWI:{lat:39.1754,lon:-76.6682},
  CLT:{lat:35.2144,lon:-80.9473},DCA:{lat:38.8521,lon:-77.0377},DEN:{lat:39.8561,lon:-104.6737},
  DFW:{lat:32.8998,lon:-97.0403},DTW:{lat:42.2162,lon:-83.3554},EWR:{lat:40.6895,lon:-74.1745},
  FLL:{lat:26.0726,lon:-80.1527},HNL:{lat:21.3245,lon:-157.9251},IAD:{lat:38.9531,lon:-77.4565},
  IAH:{lat:29.9902,lon:-95.3368},JFK:{lat:40.6413,lon:-73.7781},LAS:{lat:36.0840,lon:-115.1537},
  LAX:{lat:33.9425,lon:-118.4081},LGA:{lat:40.7772,lon:-73.8726},MCO:{lat:28.4312,lon:-81.3081},
  MIA:{lat:25.7959,lon:-80.2870},MSP:{lat:44.8848,lon:-93.2223},MSY:{lat:29.9934,lon:-90.2580},
  ORD:{lat:41.9742,lon:-87.9073},PDX:{lat:45.5898,lon:-122.5951},PHL:{lat:39.8729,lon:-75.2437},
  PHX:{lat:33.4373,lon:-112.0078},RDU:{lat:35.8776,lon:-78.7875},SAN:{lat:32.7338,lon:-117.1933},
  SEA:{lat:47.4502,lon:-122.3088},SFO:{lat:37.6213,lon:-122.3790},SLC:{lat:40.7884,lon:-111.9778},
  STL:{lat:38.7487,lon:-90.3700},TPA:{lat:27.9755,lon:-82.5332},AUS:{lat:30.1975,lon:-97.6664},
  // South America
  VCP:{lat:-23.0075,lon:-47.1345},LIM:{lat:-12.0219,lon:-77.1143},SCL:{lat:-33.3928,lon:-70.7858},
  GRU:{lat:-23.4356,lon:-46.4731},
  // Europe / Middle East
  LHR:{lat:51.4700,lon:-0.4543},LGW:{lat:51.1537,lon:-0.1821},CDG:{lat:49.0097,lon:2.5479},
  AMS:{lat:52.3105,lon:4.7683},FRA:{lat:50.0379,lon:8.5622},MUC:{lat:48.3538,lon:11.7861},
  MAD:{lat:40.4719,lon:-3.5626},BCN:{lat:41.2974,lon:2.0833},FCO:{lat:41.7999,lon:12.2462},
  IST:{lat:41.2608,lon:28.7418},TLV:{lat:32.0055,lon:34.8854},DXB:{lat:25.2528,lon:55.3644},
  DOH:{lat:25.2609,lon:51.6138},
  // Asia / Pacific
  ISB:{lat:33.5497,lon:72.8116},SIN:{lat:1.3644,lon:103.9915},HKG:{lat:22.3080,lon:113.9185},
  NRT:{lat:35.7720,lon:140.3929},ICN:{lat:37.4602,lon:126.4407},SYD:{lat:-33.9399,lon:151.1753},
  MEL:{lat:-37.6690,lon:144.8410},
  // Canada
  YYZ:{lat:43.6777,lon:-79.6248},YVR:{lat:49.1947,lon:-123.1792},
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(v, fallback = 'N/A') { return (v != null && v !== '') ? v : fallback; }

function fmtTime(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  catch { return iso; }
}

function fmtDate(iso) {
  if (!iso) return 'N/A';
  try { return new Date(iso).toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return iso; }
}

function statusPill(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s.includes('active') || s.includes('en route') || s.includes('airborne'))
    return `<span class="status-pill status-active">In Air</span>`;
  if (s.includes('land') || s.includes('arriv'))
    return `<span class="status-pill status-landed">Landed</span>`;
  if (s.includes('cancel'))
    return `<span class="status-pill status-cancelled">Cancelled</span>`;
  return `<span class="status-pill status-scheduled">Scheduled</span>`;
}

function setBadge(id, ok) {
  const el = document.getElementById('badge-' + id);
  if (el) el.classList.toggle('ok', ok);
}

function setResults(html) {
  const el = document.getElementById('results');
  el.innerHTML = html;
  if (html) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── WEATHER CODES ────────────────────────────────────────────────────────────
function wxInfo(code) {
  if (code === 0)  return { icon: '☀️',  label: 'Clear Sky' };
  if (code <= 2)   return { icon: '⛅',  label: 'Partly Cloudy' };
  if (code === 3)  return { icon: '☁️',  label: 'Overcast' };
  if (code <= 48)  return { icon: '🌫️', label: 'Foggy' };
  if (code <= 55)  return { icon: '🌦️', label: 'Drizzle' };
  if (code <= 65)  return { icon: '🌧️', label: 'Rain' };
  if (code <= 75)  return { icon: '🌨️', label: 'Snow' };
  if (code <= 82)  return { icon: '🌦️', label: 'Showers' };
  if (code <= 86)  return { icon: '🌨️', label: 'Snow Showers' };
  if (code >= 95)  return { icon: '⛈️',  label: 'Thunderstorm' };
  return { icon: '🌡️', label: 'Unknown' };
}

// ─── COORD CACHE + GEOCODING ──────────────────────────────────────────────────
const _coordCache = {};
async function getCoords(iata) {
  if (!iata) return null;
  const code = iata.toUpperCase();
  if (AIRPORTS[code]) return AIRPORTS[code];
  if (_coordCache[code]) return _coordCache[code];
  try {
    const r = await fetch(`${CFG.GEO_BASE}/search?name=${encodeURIComponent(code + ' airport')}&count=1&language=en&format=json`);
    const j = await r.json();
    if (j.results?.[0]) {
      const c = { lat: j.results[0].latitude, lon: j.results[0].longitude };
      _coordCache[code] = c;
      return c;
    }
  } catch (_) {}
  return null;
}

// ─── WEATHER FETCH (at flight-relevant time) ──────────────────────────────────
async function getWeather(lat, lon, isoDatetime) {
  const today = new Date().toISOString().slice(0, 10);
  const date  = isoDatetime ? isoDatetime.slice(0, 10) : today;
  const useDate = date < today ? today : date;
  const targetHour = isoDatetime ? new Date(isoDatetime).getHours() : new Date().getHours();
  const params = 'temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m,precipitation';

  try {
    const url = `${CFG.WX_BASE}/forecast?latitude=${lat}&longitude=${lon}` +
      `&hourly=${params}&temperature_unit=fahrenheit&wind_speed_unit=mph` +
      `&start_date=${useDate}&end_date=${useDate}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const h = j.hourly;
    if (!h) return null;

    let idx = h.time.findIndex(t => new Date(t).getHours() === targetHour);
    if (idx < 0) idx = Math.min(12, h.time.length - 1);

    setBadge('weather', true);
    return {
      temp:     Math.round(h.temperature_2m[idx]),
      feels:    Math.round(h.apparent_temperature[idx]),
      code:     h.weather_code[idx],
      wind:     Math.round(h.wind_speed_10m[idx]),
      humidity: Math.round(h.relative_humidity_2m[idx]),
      precip:   (h.precipitation[idx] ?? 0).toFixed(2),
    };
  } catch (_) { return null; }
}

// ─── WEATHER CARD HTML ────────────────────────────────────────────────────────
function wxCardHTML(wx, title, code, time) {
  const header = `<div class="wx-label">${title} — ${code}${time ? ' @ ' + fmtTime(time) : ''}</div>`;
  if (!wx) return `<div class="wx-card">${header}<div class="wx-na">Weather unavailable</div></div>`;
  const { icon, label } = wxInfo(wx.code);
  return `
    <div class="wx-card">
      ${header}
      <div class="wx-main">
        <div class="wx-icon">${icon}</div>
        <div>
          <div class="wx-temp">${wx.temp}°F</div>
          <div class="wx-cond">${label} · Feels ${wx.feels}°F</div>
        </div>
      </div>
      <div class="wx-details">
        <div class="wx-row"><span>Wind</span><span>${wx.wind} mph</span></div>
        <div class="wx-row"><span>Humidity</span><span>${wx.humidity}%</span></div>
        <div class="wx-row"><span>Precip</span><span>${wx.precip}"</span></div>
        <div class="wx-row"><span>WX Code</span><span>${wx.code}</span></div>
      </div>
    </div>`;
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function progressBarHTML(p, telemetry) {
  const pct = Math.min(100, Math.max(0, p.percentComplete));
  const milesLeft = (p.milesDirect - p.milesFlown).toLocaleString();
  const hElapsed = Math.floor(p.minutesElapsed / 60);
  const mElapsed = p.minutesElapsed % 60;
  const hTotal   = Math.floor(p.minutesTotal / 60);
  const mTotal   = p.minutesTotal % 60;
  const mRemain  = p.minutesTotal - p.minutesElapsed;
  const hRemain  = Math.floor(mRemain / 60);
  const minRemain = mRemain % 60;

  // Clamp plane icon so it's never off-edge
  const planePct = Math.min(97, Math.max(3, pct));

  return `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>Departed</span>
        <span class="pct">${pct}% complete</span>
        <span>Arrived</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
        <div class="progress-plane" style="left:${planePct}%">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#00aaff" stroke="#00aaff" stroke-width="1">
            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 3L13 6.5l-8.2-1.8L4 6l7 4-3 3-2-.5L4 14l4 2 2 4 2-1 .5-2 3-3 4 7z"/>
          </svg>
        </div>
      </div>
      <div class="progress-stats">
        <span><span class="hi">${p.milesFlown.toLocaleString()} mi</span> flown</span>
        <span><span class="hi">${hElapsed}h ${mElapsed}m</span> elapsed · <span class="hi">${hRemain}h ${minRemain}m</span> remaining</span>
        <span><span class="hi">${milesLeft} mi</span> to go</span>
      </div>
    </div>
    <div class="data-grid">
      <div class="data-cell">
        <div class="data-label">Altitude</div>
        <div class="data-value">${telemetry.altitude.toLocaleString()} ft</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Speed</div>
        <div class="data-value">${telemetry.speed} mph</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Flight Time</div>
        <div class="data-value">${hTotal}h ${mTotal}m</div>
      </div>
      <div class="data-cell">
        <div class="data-label">Distance</div>
        <div class="data-value">${p.milesDirect.toLocaleString()} mi</div>
      </div>
    </div>`;
}

// ─── FETCH LOCAL FLIGHT JSON ──────────────────────────────────────────────────
async function fetchFlight(id) {
  const r = await fetch(`${CFG.FLIGHTS_DIR}${id}.json`);
  if (!r.ok) throw new Error(`Flight file not found for "${id}"`);
  return r.json();
}

// ─── BUILD FULL DETAIL CARD ───────────────────────────────────────────────────
async function buildDetailCard(f) {
  const dep = f.departure;
  const arr = f.arrival;

  const depTime = dep.actualGate || dep.scheduledGate;
  const arrTime = arr.estimatedGate || arr.scheduledGate;

  // Fetch coords + weather in parallel at flight-specific times
  const [depCoords, arrCoords] = await Promise.all([
    getCoords(dep.iata),
    getCoords(arr.iata),
  ]);
  const [depWx, arrWx] = await Promise.all([
    depCoords ? getWeather(depCoords.lat, depCoords.lon, depTime) : null,
    arrCoords ? getWeather(arrCoords.lat, arrCoords.lon, arrTime) : null,
  ]);

  const depDelay = dep.delayMinutes > 0
    ? `<span class="delay-tag"> +${dep.delayMinutes}m</span>`
    : dep.delayMinutes < 0
      ? `<span class="early-tag"> ${dep.delayMinutes}m early</span>`
      : '';
  const arrDelay = arr.delayMinutes > 0
    ? `<span class="delay-tag"> +${arr.delayMinutes}m</span>`
    : arr.delayMinutes < 0
      ? `<span class="early-tag"> ${Math.abs(arr.delayMinutes)}m early</span>`
      : '';

  const depGateInfo = dep.terminal || dep.gate
    ? `${dep.terminal ? 'T' + dep.terminal : ''} ${dep.gate ? '· G' + dep.gate : ''}`.trim()
    : 'N/A';
  const arrGateInfo = arr.terminal || arr.gate
    ? `${arr.terminal ? 'T' + arr.terminal : ''} ${arr.gate ? '· G' + arr.gate : ''}`.trim()
    : 'N/A';

  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="flight-id">${f.flightId}</div>
          <div class="airline-name">${f.airline}</div>
        </div>
        ${statusPill(f.status)}
      </div>

      <div class="route-bar">
        <div class="airport-col">
          <div class="airport-code">${dep.iata}</div>
          <div class="airport-name">${dep.city}</div>
          <div class="airport-time">${fmtTime(depTime)}${depDelay}</div>
        </div>
        <div class="route-mid">
          <hr />
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 3L13 6.5l-8.2-1.8L4 6l7 4-3 3-2-.5L4 14l4 2 2 4 2-1 .5-2 3-3 4 7z"/>
          </svg>
          <hr />
        </div>
        <div class="airport-col" style="text-align:right">
          <div class="airport-code">${arr.iata}</div>
          <div class="airport-name">${arr.city}</div>
          <div class="airport-time">${fmtTime(arrTime)}${arrDelay}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin:1.2rem 0">
        <div>
          <div class="section-title">Route Map</div>
          <img src="images/${f.flightId}_map.png" style="width:100%;border-radius:8px;border:1px solid var(--border);display:block" />
        </div>
        <div>
          <div class="section-title">Altitude / Speed Graph</div>
          <img src="images/${f.flightId}_graph.png" style="width:100%;border-radius:8px;border:1px solid var(--border);display:block" />
        </div>
      </div>

      ${progressBarHTML(f.progress, f.telemetry)}

      <div class="data-grid" style="margin-top:.5rem">
        <div class="data-cell">
          <div class="data-label">Date</div>
          <div class="data-value">${fmtDate(f.date)}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Aircraft</div>
          <div class="data-value">${f.aircraft.code}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Dep Gate</div>
          <div class="data-value">${depGateInfo}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Arr Gate</div>
          <div class="data-value">${arrGateInfo}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Dep Taxi</div>
          <div class="data-value">${dep.taxiMinutes != null ? dep.taxiMinutes + ' min' : 'N/A'}</div>
        </div>
        <div class="data-cell">
          <div class="data-label">Arr Taxi</div>
          <div class="data-value">${arr.taxiMinutes != null ? arr.taxiMinutes + ' min' : 'N/A'}</div>
        </div>
      </div>

      ${f.route && f.route !== 'Direct' ? `
      <div class="data-cell" style="margin-bottom:1rem;font-size:.75rem;font-family:'Courier New',monospace;color:var(--muted);word-break:break-all">
        <div class="data-label" style="margin-bottom:.3rem">Route</div>
        ${f.route}
      </div>` : ''}

      <div class="wx-strip">
        ${wxCardHTML(depWx, 'Departure Weather', dep.iata, depTime)}
        ${wxCardHTML(arrWx, 'Arrival Weather', arr.iata, arrTime)}
      </div>
    </div>`;
}

// ─── BUILD COMPACT LIVE CARD ──────────────────────────────────────────────────
function buildLiveCard(f) {
  const pct = Math.min(100, Math.max(0, f.progress.percentComplete));
  const planePct = Math.min(97, Math.max(3, pct));

  const dep = f.departure;
  const arr = f.arrival;
  const depTime = dep.actualGate || dep.scheduledGate;
  const arrTime = arr.estimatedGate || arr.scheduledGate;

  return `
    <div class="live-card" onclick="searchByAlias('${f.flightId}')">
      <div class="live-card-header">
        <div>
          <div class="flight-id-small">${f.flightId}</div>
          <div class="airline-name">${f.airline}</div>
        </div>
        ${statusPill(f.status)}
      </div>
      <div class="live-route-compact">
        <div>
          <div class="airport-code-sm">${dep.iata}</div>
          <div style="font-size:.7rem;color:var(--muted)">${fmtTime(depTime)}</div>
        </div>
        <div class="dash"></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2">
          <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 3L13 6.5l-8.2-1.8L4 6l7 4-3 3-2-.5L4 14l4 2 2 4 2-1 .5-2 3-3 4 7z"/>
        </svg>
        <div class="dash"></div>
        <div style="text-align:right">
          <div class="airport-code-sm">${arr.iata}</div>
          <div style="font-size:.7rem;color:var(--muted)">${fmtTime(arrTime)}</div>
        </div>
      </div>

      <!-- Mini progress bar -->
      <div style="position:relative;height:3px;background:var(--border);border-radius:2px;margin:.8rem 0 .4rem">
        <div style="position:absolute;top:0;left:0;height:100%;width:${pct}%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px"></div>
        <div style="position:absolute;top:50%;left:${planePct}%;transform:translate(-50%,-50%)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#00aaff" stroke="#00aaff" stroke-width="1">
            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 1 16.5 3L13 6.5l-8.2-1.8L4 6l7 4-3 3-2-.5L4 14l4 2 2 4 2-1 .5-2 3-3 4 7z"/>
          </svg>
        </div>
      </div>

      <div class="live-stats-row">
        <span><span class="val">${pct}%</span> done</span>
        <span><span class="val">${f.telemetry.altitude.toLocaleString()}</span> ft</span>
        <span><span class="val">${f.telemetry.speed}</span> mph</span>
        <span><span class="val">${f.aircraft.code}</span></span>
      </div>
    </div>`;
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
async function searchFlight() {
  const raw = document.getElementById('flight-input').value.trim();
  if (!raw) return;
  const query = raw.replace(/\s+/g, '').toUpperCase();
  const fileId = ALIAS_MAP[query];

  if (!fileId) {
    setResults(`<div class="error-msg">⚠ No flight found for "${raw}". Try: DAL820, QF28, LY495, TK750, EDV4905, GTI64, N992DB</div>`);
    return;
  }

  setResults(`<div class="state-msg"><span class="spinner"></span> Loading flight data…</div>`);

  try {
    const f = await fetchFlight(fileId);
    setBadge('flights', true);
    const card = await buildDetailCard(f);
    setResults(card);
  } catch (err) {
    setResults(`<div class="error-msg">⚠ ${err.message}</div>`);
  }
}

function searchByAlias(id) {
  document.getElementById('flight-input').value = id;
  searchFlight();
}

// Enter key
document.getElementById('flight-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFlight();
});

// ─── LOAD LIVE FLIGHTS GRID ───────────────────────────────────────────────────
async function loadLiveGrid() {
  const grid = document.getElementById('live-grid');
  try {
    const flights = await Promise.all(ALL_FLIGHT_IDS.map(id => fetchFlight(id)));
    setBadge('flights', true);
    grid.innerHTML = flights.map(buildLiveCard).join('');
  } catch (err) {
    grid.innerHTML = `<div class="error-msg">⚠ Could not load live flights: ${err.message}<br><small>If opening as a local file, serve with a simple HTTP server (e.g. <code>npx serve .</code>)</small></div>`;
  }
}

// ─── STARTUP ──────────────────────────────────────────────────────────────────
(async () => {
  // Ping weather API
  try {
    const r = await fetch(`${CFG.WX_BASE}/forecast?latitude=40.78&longitude=-73.87&current=temperature_2m`);
    if (r.ok) setBadge('weather', true);
  } catch (_) {}

  loadLiveGrid();
})();
</script>
